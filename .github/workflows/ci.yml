name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --locked

      - name: Install browser dependencies
        run: uv run patchright install chromium --with-deps

      - name: Syntax check
        run: uv run python -m compileall main.py get_token.py utils.py controllers

      - name: Run register
        run: |
          mkdir -p Results
          xvfb-run -a uv run python main.py

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outlook-results
          path: Results/
          if-no-files-found: ignore
