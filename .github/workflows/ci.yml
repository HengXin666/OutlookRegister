name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --locked

      - name: Install browser dependencies
        run: uv run patchright install chromium --with-deps

      - name: Syntax check
        run: uv run python -m compileall main.py get_token.py utils.py controllers

      - name: Start subscription proxy
        timeout-minutes: 3
        env:
          PROXY_SUBSCRIPTION_URL: ${{ secrets.PROXY_SUBSCRIPTION_URL }}
        run: |
          test -n "$PROXY_SUBSCRIPTION_URL"
          mkdir -p proxy
          curl -fsSL "$PROXY_SUBSCRIPTION_URL" -o proxy/subscription.txt
          uv run python - <<'PY'
          import base64
          from pathlib import Path
          from urllib.parse import parse_qs, unquote, urlparse

          import yaml

          raw = Path("proxy/subscription.txt").read_bytes()
          compact = b"".join(raw.split())
          padding = b"=" * (-len(compact) % 4)
          text = base64.b64decode(compact + padding).decode("utf-8")

          proxies = []
          used_names = set()

          def unique_name(name):
              base = name or "proxy"
              candidate = base
              index = 2
              while candidate in used_names:
                  candidate = f"{base}-{index}"
                  index += 1
              used_names.add(candidate)
              return candidate

          for line in (item.strip() for item in text.splitlines()):
              if not line:
                  continue

              parsed = urlparse(line)
              query = parse_qs(parsed.query)
              name = unique_name(unquote(parsed.fragment) or parsed.hostname or parsed.scheme)

              if parsed.scheme == "vless":
                  proxy = {
                      "name": name,
                      "type": "vless",
                      "server": parsed.hostname,
                      "port": parsed.port,
                      "uuid": parsed.username,
                      "network": query.get("type", ["tcp"])[0],
                      "udp": True,
                  }
                  if query.get("flow"):
                      proxy["flow"] = query["flow"][0]
                  if query.get("security", [""])[0] in {"tls", "reality"}:
                      proxy["tls"] = True
                  if query.get("sni"):
                      proxy["servername"] = query["sni"][0]
                  if query.get("fp"):
                      proxy["client-fingerprint"] = query["fp"][0]
                  if query.get("insecure", ["0"])[0].lower() in {"1", "true"}:
                      proxy["skip-cert-verify"] = True
                  if proxy["network"] == "ws":
                      proxy["ws-opts"] = {
                          "path": query.get("path", ["/"])[0],
                          "headers": {"Host": query.get("host", [parsed.hostname])[0]},
                      }
                  if query.get("security", [""])[0] == "reality":
                      proxy["reality-opts"] = {
                          "public-key": query.get("pbk", [""])[0],
                          "short-id": query.get("sid", [""])[0],
                      }
                  proxies.append(proxy)

              elif parsed.scheme == "hysteria2":
                  proxy = {
                      "name": name,
                      "type": "hysteria2",
                      "server": parsed.hostname,
                      "port": parsed.port,
                      "password": parsed.username,
                      "udp": True,
                  }
                  if query.get("mport"):
                      proxy["ports"] = query["mport"][0]
                  if query.get("sni"):
                      proxy["sni"] = query["sni"][0]
                  if query.get("insecure", ["false"])[0].lower() in {"1", "true"}:
                      proxy["skip-cert-verify"] = True
                  proxies.append(proxy)

          if not proxies:
              raise SystemExit("subscription contains no supported proxy nodes")

          config = {
              "mixed-port": 2334,
              "allow-lan": False,
              "mode": "rule",
              "log-level": "info",
              "proxies": proxies,
              "proxy-groups": [
                  {
                      "name": "Proxy",
                      "type": "url-test",
                      "proxies": [proxy["name"] for proxy in proxies],
                      "url": "https://www.microsoft.com",
                      "interval": 300,
                  }
              ],
              "rules": ["MATCH,Proxy"],
          }
          Path("proxy/config.yaml").write_text(
              yaml.safe_dump(config, allow_unicode=True, sort_keys=False),
              encoding="utf-8",
          )
          PY
          curl -fsSL https://github.com/MetaCubeX/mihomo/releases/download/v1.19.15/mihomo-linux-amd64-v1.19.15.gz -o proxy/mihomo.gz
          gunzip proxy/mihomo.gz
          chmod +x proxy/mihomo
          ./proxy/mihomo -f proxy/config.yaml > proxy/mihomo.log 2>&1 &
          echo $! > proxy/mihomo.pid
          for i in {1..30}; do
            if curl -fsS --proxy http://127.0.0.1:2334 https://www.microsoft.com >/dev/null; then
              exit 0
            fi
            if ! kill -0 "$(cat proxy/mihomo.pid)" 2>/dev/null; then
              cat proxy/mihomo.log
              exit 1
            fi
            sleep 2
          done
          cat proxy/mihomo.log
          exit 1

      - name: Configure workflow proxy
        run: |
          uv run python - <<'PY'
          import json
          from pathlib import Path

          path = Path("config.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          data["proxy"] = "http://127.0.0.1:2334"
          path.write_text(json.dumps(data, ensure_ascii=False, indent=4) + "\n", encoding="utf-8")
          PY

      - name: Run register
        run: |
          mkdir -p Results
          xvfb-run -a uv run python main.py

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outlook-results
          path: Results/
          if-no-files-found: ignore
