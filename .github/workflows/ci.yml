name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --locked

      - name: Install browser dependencies
        run: uv run patchright install chromium --with-deps

      - name: Syntax check
        run: uv run python -m compileall main.py get_token.py utils.py controllers

      - name: Start subscription proxy
        timeout-minutes: 3
        env:
          PROXY_SUBSCRIPTION_URL: ${{ secrets.PROXY_SUBSCRIPTION_URL }}
        run: |
          test -n "$PROXY_SUBSCRIPTION_URL"
          mkdir -p proxy
          curl -fsSL "$PROXY_SUBSCRIPTION_URL" -o proxy/subscription.txt
          uv run python -m http.server 25501 --bind 127.0.0.1 --directory proxy > proxy/subscription-server.log 2>&1 &
          echo $! > proxy/subscription-server.pid
          curl -fsSL https://github.com/tindy2013/subconverter/releases/download/v0.9.0/subconverter_linux64.tar.gz -o proxy/subconverter.tar.gz
          tar -xzf proxy/subconverter.tar.gz -C proxy
          ./proxy/subconverter/subconverter > proxy/subconverter.log 2>&1 &
          echo $! > proxy/subconverter.pid
          subconverter_ready=0
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:25500/version >/dev/null; then
              subconverter_ready=1
              break
            fi
            if ! kill -0 "$(cat proxy/subconverter.pid)" 2>/dev/null; then
              cat proxy/subconverter.log
              exit 1
            fi
            sleep 1
          done
          if [ "$subconverter_ready" -ne 1 ]; then
            cat proxy/subconverter.log
            exit 1
          fi
          uv run python - <<'PY'
          from pathlib import Path
          from urllib.parse import quote
          import requests

          url = "http://127.0.0.1:25501/subscription.txt"
          convert_url = "http://127.0.0.1:25500/sub?target=clash&url=" + quote(url, safe="")
          response = requests.get(convert_url, timeout=60)
          response.raise_for_status()
          Path("proxy/config.yaml").write_bytes(response.content)
          PY
          uv run python - <<'PY'
          from pathlib import Path
          import yaml

          path = Path("proxy/config.yaml")
          config = yaml.safe_load(path.read_text(encoding="utf-8"))
          if not isinstance(config, dict):
              raise SystemExit("subscription content is not a Clash YAML config")

          config["port"] = 2334
          config["mixed-port"] = 2334
          config["allow-lan"] = False
          path.write_text(yaml.safe_dump(config, allow_unicode=True, sort_keys=False), encoding="utf-8")
          PY
          curl -fsSL https://github.com/MetaCubeX/mihomo/releases/download/v1.19.15/mihomo-linux-amd64-v1.19.15.gz -o proxy/mihomo.gz
          gunzip proxy/mihomo.gz
          chmod +x proxy/mihomo
          ./proxy/mihomo -f proxy/config.yaml > proxy/mihomo.log 2>&1 &
          echo $! > proxy/mihomo.pid
          for i in {1..30}; do
            if curl -fsS --proxy http://127.0.0.1:2334 https://www.microsoft.com >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat proxy/mihomo.log
          exit 1

      - name: Configure workflow proxy
        run: |
          uv run python - <<'PY'
          import json
          from pathlib import Path

          path = Path("config.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          data["proxy"] = "http://127.0.0.1:2334"
          path.write_text(json.dumps(data, ensure_ascii=False, indent=4) + "\n", encoding="utf-8")
          PY

      - name: Run register
        run: |
          mkdir -p Results
          xvfb-run -a uv run python main.py

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outlook-results
          path: Results/
          if-no-files-found: ignore
